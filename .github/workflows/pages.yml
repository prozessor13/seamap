name: Deploy viewer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy-pages action to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - run: npm --prefix viewer ci

      # Project Pages serve under /<repo>/, so assets need that base path.
      # Change to /  when this moves to a custom domain (e.g. openwaters.io).
      - run: npm --prefix viewer run build -- --base=/seamap/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: viewer/dist
      - id: deployment
        uses: actions/deploy-pages@v5
